<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RiazAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1>RiazAI.</h1>
            <h2>Welcome back.</h2>
            <p>Sign in to analyze your practice.</p>
        </div>

        <div id="error-banner" class="error-banner" style="display: none;"></div>
        <div id="success-banner" class="success-banner auth-success" style="display: none;"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="text" id="username" class="auth-input" placeholder="Username" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="auth-input" placeholder="Password" required>
            </div>

            <div class="auth-extras">
                <label class="remember-me">
                    <input type="checkbox" id="remember-me"> Remember Me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // Check URL parameters for messages
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('registered')) {
        const sb = document.getElementById('success-banner');
        sb.textContent = "Account created successfully. Please sign in!";
        sb.style.display = 'block';
    }
    if (urlParams.has('logout')) {
        const sb = document.getElementById('success-banner');
        sb.textContent = "You have been securely logged out.";
        sb.style.display = 'block';
    }
    if (urlParams.has('error')) {
        const eb = document.getElementById('error-banner');
        eb.textContent = urlParams.get('error') === 'session_expired' ? 'Session expired. Please log in again.' : 'Authentication error.';
        eb.style.display = 'block';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const eb = document.getElementById('error-banner');
        eb.style.display = 'none';
        
        try {
            await api.login(
                document.getElementById('username').value,
                document.getElementById('password').value
            );
            // Login successful, redirect to dashboard
            window.location.href = 'index.html';
        } catch (err) {
            eb.textContent = "Invalid username or password.";
            eb.style.display = 'block';
        }
    });
</script>

</body>
</html>
