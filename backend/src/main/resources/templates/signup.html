<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RiazAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1>RiazAI.</h1>
            <h2>Join RiazAI</h2>
            <p>Create an account to start tracking.</p>
        </div>

        <div th:if="${error}" class="error-banner" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <input type="text" name="username" class="auth-input" placeholder="Choose a Username" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="auth-input" placeholder="Create a Password" required>
            </div>

            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
        </div>
    </div>
</div>

</body>
</html>
