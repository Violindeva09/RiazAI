<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RiazAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1>RiazAI.</h1>
            <h2>Welcome back.</h2>
            <p>Sign in to analyze your practice.</p>
        </div>

        <div th:if="${param.error}" class="error-banner">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="success-banner auth-success" >
            You have been securely logged out.
        </div>
        <div th:if="${param.registered}" class="success-banner auth-success">
            Account created successfully. Please sign in!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <input type="text" name="username" class="auth-input" placeholder="Username" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="auth-input" placeholder="Password" required>
            </div>

            <div class="auth-extras">
                <label class="remember-me">
                    <input type="checkbox" name="remember-me"> Remember Me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a th:href="@{/signup}">Sign up</a></p>
        </div>
    </div>
</div>

</body>
</html>
