# configure max upload size to avoid 413 errors and ERR_CONNECTION_RESET
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-swallow-size=-1

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Native auth properties removed: Spring now exclusively uses Database-backed CustomUserDetailsService with BCrypt.

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.com.riazai=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Spring AI / OpenAI Configuration (Rerouting to OpenRouter)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=google/gemma-7b-it:free
spring.ai.retry.max-attempts=1
spring.ai.openai.retry.max-attempts=1

# Cross-Domain Session Cookie Support (Required for Vercel -> Render communication)
# Secure must be true for SameSite=None to work in modern browsers.
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
